{% extends "base.html" %}
{% block content %}

<h2>Chat with {{ other_user.username }}</h2>

<div style="
    margin-bottom:20px;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
    width:450px;
    max-height:300px;
    overflow-y:auto;
">

{% for msg in conversation %}

    <div style="margin-bottom:10px;">

        <strong>
        {% if msg.sender_id == current_user.id %}
            You
        {% else %}
            {{ other_user.username }}
        {% endif %}
        </strong>

        : {{ msg.content }}

        <br>

        <small style="color:gray;">
            {{ msg.created_at }}
        </small>

    </div>

{% endfor %}

</div>


<!-- Message Form -->
<form method="POST" style="width:450px; margin-bottom:10px;">

    <input 
        name="content" 
        id="messageBox"
        placeholder="Type message..." 
        required
        style="width:70%; padding:6px;"
    >

    <button type="submit">
        Send
    </button>

</form>


<!-- AI Suggest Reply Button -->

<button onclick="suggestReply()" style="
    padding:6px 12px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:4px;
">
AI Suggest Reply
</button>


<script>

function suggestReply() {

    fetch("/ai/suggest-reply", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            user_id: {{ other_user.id }}
        })

    })

    .then(response => response.json())

    .then(data => {

        document.getElementById("messageBox").value = data.suggestion;

    });

}

</script>

{% endblock %}
